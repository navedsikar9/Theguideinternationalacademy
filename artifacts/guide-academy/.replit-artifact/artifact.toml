kind = "web"
previewPath = "/"
title = "THE GUIDE International Academy"
version = "1.0.0"
id = "artifacts/guide-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20321

[services.development]
run = "pnpm --filter @workspace/guide-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guide-academy", "run", "build" ]
publicDir = "artifacts/guide-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20321"
BASE_PATH = "/"
